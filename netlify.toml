[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

[functions]
  node_bundler = "esbuild"

# Security & caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

[[headers]]
  for = "/.netlify/functions/prayer-times"
  [headers.values]
    Access-Control-Allow-Origin = "*"

# Astro content-hashes every bundled CSS/JS file under /_astro/, so it's
# always safe to cache them forever — a new deploy is served from new URLs.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

# Redirect www to apex
[[redirects]]
  from = "https://www.roundrockmasjid.org/*"
  to = "https://roundrockmasjid.org/:splat"
  status = 301
  force = true
